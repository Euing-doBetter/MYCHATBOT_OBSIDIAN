<script>
    // 전역 변수: 로드된 성장 데이터를 저장할 변수
    let GROWTH_DATA_MALE = [];
    let GROWTH_DATA_FEMALE = [];
    let growthChartInstance = null; 

    // DOMContentLoaded 시점에 파일을 미리 로드합니다.
    document.addEventListener('DOMContentLoaded', async function() {
        const calculateButton = document.getElementById('calculate-button');
        
        // 1. 새로운 파일 로드 함수 호출: 비동기 완료 대기
        await loadGrowthData('growth_data_male.csv', 'male');
        await loadGrowthData('growth_data_female.csv', 'female');
        
        // 2. 데이터 로드가 모두 완료된 후 버튼 활성화 
        if (GROWTH_DATA_MALE.length > 0 && GROWTH_DATA_FEMALE.length > 0) {
            calculateButton.disabled = false;
            calculateButton.textContent = "결과 보기";
        } else {
            // 데이터 로드 실패 시
            calculateButton.textContent = "데이터 로드 실패";
            document.getElementById('error-message').textContent = "성장 데이터 로드에 실패했습니다. 파일 경로를 확인해주세요.";
            document.getElementById('error-message').style.display = 'block';
        }

        // 3. 초기값 설정
        const currentYear = new Date().getFullYear();
        document.getElementById('birth_year').value = currentYear - 6; 
        
        // 4. 폼 제출 이벤트 리스너 설정
        document.getElementById('height-calculator-form').addEventListener('submit', function(event) {
            event.preventDefault(); 
            calculateHeight();
        });
    });

    /**
     * CSV 파일을 읽고 파싱하여 전역 변수에 저장하는 함수
     */
    async function loadGrowthData(filePath, genderType) {
        try {
            const response = await fetch(filePath);
            const csvText = await response.text();
            
            const lines = csvText.trim().split('\n');
            let dataArray = [];
            
            lines.forEach(line => {
                const values = line.split(',').map(v => v.trim()).filter(v => v !== ''); 
                
                if (values.length === 4) {
                    const age = parseFloat(values[0]);
                    const p3 = parseFloat(values[1]);
                    const p50 = parseFloat(values[2]);
                    const p97 = parseFloat(values[3]);
                    
                    if (!isNaN(age) && !isNaN(p3) && !isNaN(p50) && !isNaN(p97)) {
                        dataArray.push([age, p3, p50, p97]);
                    }
                }
            });

            if (genderType === 'male') {
                GROWTH_DATA_MALE = dataArray;
            } else {
                GROWTH_DATA_FEMALE = dataArray;
            }
            
            console.log(`성장 데이터 로드 완료 (${genderType}): ${dataArray.length}개 행`);

        } catch (error) {
            console.error(`CSV 파일을 로드하거나 파싱하는 데 실패했습니다 (${genderType}):`, error);
        }
    }


    /**
     * 출생연도를 기반으로 만 나이(년)를 계산하는 함수
     */
    function calculateAge(birthYear) {
        const currentYear = new Date().getFullYear();
        const age = currentYear - birthYear; 
        return age; 
    }

    /**
     * 아이의 현재 키를 바탕으로 백분위수와 판정을 내리는 함수
     */
    function getPercentile(age, currentHeight, gender) {
        const data = gender === 'male' ? GROWTH_DATA_MALE : GROWTH_DATA_FEMALE;
        
        const ageData = data.find(d => d[0] === age); 
        
        if (!ageData) {
            return { percentile: 'N/A', judgment: '해당 나이 데이터 없음' };
        }
        
        const [ageYears, p3, p50, p97] = ageData; 
        
        let percentile = '50th 근처';
        let judgment = '평균';

        if (currentHeight >= p97) {
            percentile = '97th 이상';
            judgment = '매우 우수 (P97+)';
        } 
        else if (currentHeight >= p50) {
            percentile = '50th ~ 97th';
            judgment = '평균 상위';
        } 
        else if (currentHeight >= p3) {
            percentile = '3rd ~ 50th';
            judgment = '평균 하위';
        } 
        else {
            percentile = '3rd 이하';
            judgment = '성장 전문가 상담 권유 (P3-)';
        }
        
        return { percentile, judgment };
    }


    /**
     * Chart.js 데이터셋 준비 함수
     */
    function getChartData(childAge, currentHeight, gender) {
        const data = gender === 'male' ? GROWTH_DATA_MALE : GROWTH_DATA_FEMALE;
        
        const labels = data.map(d => `${d[0]}세`);
        
        const p3Data = data.map(d => d[1]);
        const p50Data = data.map(d => d[2]);
        const p97Data = data.map(d => d[3]);

        const currentData = new Array(labels.length).fill(null);
        if (childAge >= 0 && childAge < labels.length) {
            const index = data.findIndex(d => d[0] === childAge);
            if (index !== -1) {
                currentData[index] = currentHeight; 
            }
        }

        return {
            labels: labels,
            datasets: [
                { label: 'P97 (상단선)', data: p97Data, borderColor: 'rgb(255, 99, 132)', backgroundColor: 'rgba(255, 99, 132, 0.1)', borderWidth: 2, pointRadius: 1, tension: 0.4, fill: false },
                { label: 'P50 (중앙선)', data: p50Data, borderColor: 'rgb(75, 192, 192)', backgroundColor: 'rgba(75, 192, 192, 0.1)', borderWidth: 3, pointRadius: 1, tension: 0.4, fill: false },
                { label: 'P3 (하단선)', data: p3Data, borderColor: 'rgb(255, 159, 64)', backgroundColor: 'rgba(255, 159, 64, 0.1)', borderWidth: 2, pointRadius: 1, tension: 0.4, fill: false },
                { label: '현재 아이 키', data: currentData, borderColor: 'rgb(0, 0, 139)', backgroundColor: 'rgb(0, 0, 139)', pointRadius: 8, pointStyle: 'circle', showLine: false, fill: false }
            ]
        };
    }

    /**
     * Chart.js를 이용하여 그래프를 실제로 그리는 함수
     */
    function drawChart(data) {
        const ctx = document.getElementById('growthChart').getContext('2d');

        if (growthChartInstance) {
            growthChartInstance.destroy();
        }
        
        const allHeights = data.datasets.flatMap(d => d.data.filter(h => h !== null));
        const minHeight = Math.min(...allHeights);
        const maxHeight = Math.max(...allHeights);
        

        growthChartInstance = new Chart(ctx, {
            type: 'line',
            data: data,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: { display: true, text: '연령별 성장 곡선 (P3, P50, P97)', font: { size: 16, weight: 'bold' } },
                    legend: { position: 'bottom' }
                },
                scales: {
                    x: { title: { display: true, text: '만 나이 (세)' }, grid: { display: false } },
                    y: { title: { display: true, text: '키 (cm)' }, min: Math.floor((minHeight - 5) / 10) * 10, max: Math.ceil((maxHeight + 5) / 10) * 10 }
                }
            }
        });
    }


    /**
     * 메인 계산 및 결과 출력 함수
     */
    function calculateHeight() {
        const motherHeight = parseFloat(document.getElementById('mother_height').value);
        const fatherHeight = parseFloat(document.getElementById('father_height').value);
        const birthYear = parseInt(document.getElementById('birth_year').value);
        const currentHeight = parseFloat(document.getElementById('current_height').value);
        const genderElement = document.querySelector('input[name="gender"]:checked');
        const gender = genderElement ? genderElement.value : null;
        
        const errorMessage = document.getElementById('error-message');
        const resultBox = document.getElementById('result-box');
        const finalHeightSpan = document.getElementById('final-height');
        const postsSection = document.getElementById('posts-section'); 
        const childAgeElement = document.getElementById('child-age');
        const childPercentileElement = document.getElementById('child-percentile');
        const childJudgmentElement = document.getElementById('child-judgment');


        // 2. 입력값 유효성 검사
        if (!genderElement || isNaN(motherHeight) || isNaN(fatherHeight) || motherHeight <= 0 || fatherHeight <= 0 || isNaN(birthYear) || isNaN(currentHeight)) {
            errorMessage.style.display = 'block';
            resultBox.style.display = 'none';
            postsSection.style.display = 'none'; 
            return;
        }

        errorMessage.style.display = 'none';

        // 3. MPH 공식 적용 (예상 최종키)
        let predictedHeight = 0;
        const sumOfParents = motherHeight + fatherHeight;
        
        if (gender === 'male') {
            predictedHeight = (sumOfParents + 13) / 2;
        } else if (gender === 'female') {
            predictedHeight = (sumOfParents - 13) / 2;
        }
        
        // 4. 백분위 계산 실행
        const childAgeYears = calculateAge(birthYear);
        const percentileResult = getPercentile(childAgeYears, currentHeight, gender);

        // 5. 결과 정리 및 표시
        const finalPredictedHeight = predictedHeight.toFixed(1);
        finalHeightSpan.textContent = finalPredictedHeight;
        
        childAgeElement.textContent = `${childAgeYears}세`;
        childPercentileElement.textContent = percentileResult.percentile;
        childJudgmentElement.textContent = percentileResult.judgment;
        
        resultBox.style.display = 'block';
        postsSection.style.display = 'block'; 
        
        // 6. Chart.js 그래프 그리기
        const chartData = getChartData(childAgeYears, currentHeight, gender);
        drawChart(chartData);
        
        // 7. 자동 스크롤 전 100ms 지연
        setTimeout(() => {
            resultBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    }

    let ALL_POSTS = [];      // 전체 게시물 담을 통

    // 페이지 로드 시 게시물 불러오기 시작
    document.addEventListener('DOMContentLoaded', async function() {
        // ... (기존 성장 계산기 초기화 코드들) ...

    /**
     * 1. posts.json 파일 읽어오기
     */
    async function loadPosts() {
        try {
            const response = await fetch('posts.json');
            ALL_POSTS = await response.json();
            
            // 첫 페이지 그리기
            renderPostList(1);
            renderPagination();
        } catch (error) {
            console.error("게시물 로드 실패:", error);
            document.getElementById('dynamic-post-list').innerHTML = "<p style='text-align:center;'>게시물을 불러오는 중 오류가 발생했습니다.</p>";
        }
    }

    /**
     * 2. 화면에 게시물 목록 뿌리기
     */
    function renderPostList(page) {
        const listContainer = document.getElementById('dynamic-post-list');
        listContainer.innerHTML = ""; // 싹 비우기

        // 보여줄 범위 계산 (예: 1페이지면 0~3번, 2페이지면 3~6번)
        const startIndex = (page - 1) * ITEMS_PER_PAGE;
        const endIndex = startIndex + ITEMS_PER_PAGE;
        const pageData = ALL_POSTS.slice(startIndex, endIndex);

        // 하나씩 HTML 만들어서 넣기
        pageData.forEach(post => {
            const html = `
                <div class="post-item" onclick="openPost('${post.id}')">
                    <img src="${post.image}" alt="썸네일" class="post-thumbnail">
                    <div class="post-info">
                        <div class="post-title">${post.title}</div>
                        <div class="post-summary">${post.summary}</div>
                    </div>
                </div>
            `;
            listContainer.innerHTML += html;
        });

        CURRENT_PAGE = page;
        renderPagination(); // 페이지 번호 갱신
    }

    /**
     * 3. 페이지 번호 버튼 만들기
     */
    function renderPagination() {
        
        const container = document.getElementById('pagination-container');
        container.style.display = "flex";          // 가로로 정렬
        container.style.justifyContent = "center"; // 가운데 정렬
        container.style.alignItems = "center";
        container.style.gap = "0px";               // 🔥 여기서 간격을 숫자로 조절하세요 (0도 가능)
        container.innerHTML = "";

        const totalPages = Math.ceil(ALL_POSTS.length / ITEMS_PER_PAGE);
        if (totalPages <= 1) return; // 1페이지뿐이면 버튼 안 만듦

        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            
           // 스타일 꾸미기 (심플한 숫자 버전)
            btn.style.border = "none";
            btn.style.background = "transparent"; // 배경색 투명하게 (박스 제거)
            btn.style.padding = "0";              // 패딩 제거
            btn.style.margin = "5px";           // 숫자 사이 간격 벌리기
            btn.style.minWidth = "auto";       // 기본 최소 너비 해제
            btn.style.width = "auto";          // 콘텐츠에 딱 맞게
            btn.style.cursor = "pointer";
            btn.style.fontSize = "15px";          // 글자 크기 살짝 키움

            // 현재 페이지는 '진한 파란색', 나머지는 '연한 회색'
            if (i === CURRENT_PAGE) {
                btn.style.color = "#2563eb";      // 현재 페이지 색상
                btn.style.fontWeight = "bold";    // 굵게
                btn.style.textDecoration = "underline"; // 밑줄 (선택된 느낌)
            } else {
                btn.style.color = "#999";         // 나머지 페이지 색상 (연하게)
                btn.style.fontWeight = "normal";
                btn.style.textDecoration = "none";
            }

            btn.onclick = () => renderPostList(i); // 클릭하면 이동
            container.appendChild(btn);
        }
    }
    function openPost(postId) {
        const post = ALL_POSTS.find(p => p.id === postId);
        if (!post) return;

        // 화면 표시 로직
        document.getElementById('detail-title').innerText = post.title;
        document.getElementById('detail-body').innerHTML = post.body;
        document.getElementById('post-detail-view').style.display = 'block';
        document.getElementById('dynamic-post-list').style.display = 'none';
        document.getElementById('pagination-container').style.display = 'none';

        // 🔥 주소창 변경: 이제 하이픈이 들어간 ID가 그대로 주소에 붙습니다.
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?post=' + encodeURIComponent(postId);
        window.history.pushState({ path: newUrl }, '', newUrl);

        // 조회수 증가 (Firebase)
        db.ref('posts/' + postId + '/views').transaction((current) => (current || 0) + 1);
    }
    function closePost() {

        // 1. 상세창 숨기고 리스트 다시 보여주기
        document.getElementById('post-detail-view').style.display = 'none';
        document.getElementById('dynamic-post-list').style.display = 'block';
        document.getElementById('pagination-container').style.display = 'block';

        // 2. 주소창에서 ?post=... 부분을 완전히 제거하고 메인 도메인만 남기기
        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
    
        // pushState는 기록을 쌓고, replaceState는 현재 기록을 덮어씁니다.
        // 여기서는 '뒤로가기' 느낌을 주기 위해 pushState를 사용합니다.
        window.history.pushState({ path: cleanUrl }, '', cleanUrl);

        // 3. 화면을 맨 위로 올리기
        window.scrollTo(0, 0);
    }

    function checkUrlAndOpenPost() {
        const urlParams = new URLSearchParams(window.location.search);
        const postIdFromUrl = urlParams.get('post');

        if (postIdFromUrl) {
            // 🔥 주소창의 ID와 데이터의 ID를 직접 비교 (하이픈끼리 대조)
            const post = ALL_POSTS.find(p => p.id === postIdFromUrl);
            if (post) {
                openPost(post.id);
            }
        } else {
            // 주소에 파라미터가 없으면 메인 리스트 보여주기
            document.getElementById('post-detail-view').style.display = 'none';
            document.getElementById('dynamic-post-list').style.display = 'block';
            document.getElementById('pagination-container').style.display = 'block';
        }
    }
