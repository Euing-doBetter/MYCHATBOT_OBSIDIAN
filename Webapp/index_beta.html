<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 아이 예상키 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <!-- <script src="posts.js"></script> -->
    <meta name="description" content="우리 아이의 최종 예상 키와 현재 키 백분위를 과학적인 공식을 기반으로 쉽고 빠르게 계산해보세요.">
    <meta property="og:title" content="우리 아이 예상 최종 키 및 백분위 계산기">
    <meta property="og:description" content="우리 아이의 최종 예상 키와 현재 키 백분위를 과학적인 공식을 기반으로 쉽고 빠르게 계산해보세요.">
    <meta property="og:type" content="website">

    <style>
        /* CSS: 디자인 및 레이아웃 */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 450px;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 30px;
            font-size: 1.8em;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            padding: 10px 0;
        }
        .radio-group input[type="radio"] {
            margin-right: 5px;
            width: auto;
        }
        .radio-group label {
            font-weight: normal;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1e40af;
        }
        #result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #ecfdf5;
            border: 2px solid #059669;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        #result-box p {
            margin: 0 0 5px 0;
            color: #065f46;
        }
        #final-height {
            font-size: 2.5em;
            font-weight: 700;
            color: #065f46;
        }
        .error-message {
            color: red;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        #go-to-service {
            background-color: #f59e0b; 
            margin-top: 15px;
            width: 80%;
            margin-left: 10%;
            padding: 10px;
        }
        #go-to-service:hover {
            background-color: #d97706;
        }
        .ad-container {
            margin-top: 25px;       
            margin-bottom: 25px;    
            text-align: center;     
            padding: 10px;
        }
        /* 백분위 결과 영역 스타일 */
        #percentile-result {
            margin-top: 20px; 
            border-top: 1px dashed #ccc; 
            padding-top: 15px;
            margin-bottom: 20px;
        }
        /* 그래프 영역 스타일 */
        #growth-chart-container {
            height: 300px; 
            margin-bottom: 20px;
        }
        
        /* 게시물 섹션 스타일 */
        #posts-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            display: none; 
        }
        .section-title {
            font-size: 1.4em;
            color: #1e3a8a;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        .post-list {
            display: flex;
            flex-direction: column; 
            gap: 15px;
        }
        
        /* 게시물 아이템 스타일 */
        .post-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background-color: #ffffff;
            border: 1px solid #eee;
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            transition: box-shadow 0.2s;
            cursor: pointer; /* 클릭 가능 표시 */
        }
        .post-item:hover {
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            background-color: #f9fafb;
        }
        .post-thumbnail {
            width: 70px;
            height: 70px;
            border-radius: 4px;
            object-fit: cover;
            margin-right: 15px;
            background-color: #f0f0f0; 
        }
        .post-info {
            flex-grow: 1;
        }
        .post-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .post-summary {
            font-size: 0.9em;
            color: #777;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical;
        }

        /* 🌟🌟🌟 풀스크린 오버레이(상세화면) 스타일 🌟🌟🌟 */
        #post-detail-view {
            display: none; /* 기본적으로 숨김 */
            position: fixed; /* 화면에 고정 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* 흰색 배경으로 뒤를 완전히 가림 */
            z-index: 9999; /* 모든 요소보다 맨 위에 배치 */
            overflow-y: auto; /* 내용이 길면 스크롤 가능하게 */
        }

        /* 상세 화면 내부 컨텐츠 정렬 */
        .detail-content-wrapper {
            max-width: 600px; /* PC에서 글이 너무 퍼지지 않게 제한 */
            margin: 0 auto;   /* 중앙 정렬 */
            padding: 20px;    /* 모바일에서 여백 확보 */
            padding-top: 20px; 
            background: white;
            min-height: 100%; /* 최소 높이를 화면 전체로 */
        }

        /* 뒤로가기 버튼 영역 (상단 고정) */
        .back-button-container {
            position: sticky;
            top: 0;
            background: white;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 25px;
            z-index: 100; /* 스크롤 시 글자 위로 오게 */
        }

        .back-button {
            background-color: transparent;
            color: #333;
            border: 1px solid #ccc;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: auto;
            margin-top: 0; /* 기존 버튼 스타일 초기화 */
        }
        .back-button:hover {
            background-color: #f3f4f6;
        }

        /* 상세 내용 스타일 */
        #detail-title {
            font-size: 1.8em;
            font-weight: bold;
            color: #111;
            margin-bottom: 30px;
            line-height: 1.3;
        }
        #detail-body {
            font-size: 1.1em;
            line-height: 1.8;
            color: #444;
        }
        #detail-body p {
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>우리 아이 예상키 계산기</h1>

    <form id="height-calculator-form">
        
        <div class="input-group">
            <label>성별</label>
            <div class="radio-group">
                <input type="radio" id="gender_male" name="gender" value="male" required>
                <label for="gender_male">남자</label>
                <input type="radio" id="gender_female" name="gender" value="female" required>
                <label for="gender_female">여자</label>
            </div>
        </div>
        
        <div class="input-group">
            <label for="birth_year">출생연도</label>
            <input type="number" id="birth_year" placeholder="예: 2018" min="1950" max="2024" required>
        </div>

        <div class="input-group">
            <label for="mother_height">어머니 키 (cm)</label>
            <input type="number" id="mother_height" placeholder="예: 165" min="100" max="250" required>
        </div>

        <div class="input-group">
            <label for="father_height">아버지 키 (cm)</label>
            <input type="number" id="father_height" placeholder="예: 178" min="100" max="250" required>
        </div>

        <div class="input-group">
            <label for="current_height">우리아이 현재 키 (cm)</label>
            <input type="number" id="current_height" placeholder="예: 130" min="50" max="250" required>
        </div>

        <div class="error-message" id="error-message">모든 정보를 정확하게 입력해주세요.</div>

        <button type="submit" id="calculate-button">결과 보기</button>
    </form>
    
    <div class="ad-container">
        <p style="text-align: center; font-size: 0.8em; color: #aaa;">⭐ 광고 배너 영역</p>
    </div>

    <div id="result-box">
        <p>예상 최종키:</p>
        <div id="final-height">0.0</div>
        <p>cm (±4cm)</p>

        <div id="percentile-result">
            <p style="font-size: 1.1em; font-weight: bold; color: #1e3a8a;">우리 아이 현재 성장 발달</p>
            <div style="display: flex; justify-content: space-around; text-align: center;">
                <div><p style="font-size: 0.9em; color: #555;">만 나이</p><strong id="child-age">0세</strong></div>
                <div><p style="font-size: 0.9em; color: #555;">비교 (P50)</p><strong id="child-percentile">-</strong></div>
                <div><p style="font-size: 0.9em; color: #555;">판정</p><strong id="child-judgment">-</strong></div>
            </div>
        </div>
        
        <div id="growth-chart-container">
            <canvas id="growthChart"></canvas>
        </div>
        <p style="font-size: 0.8em; color: #666; margin-top: 10px;">자료출처: 질병관리청 성장도표 (가상 P50)</p>
        <button id="go-to-service" onclick="goToExternalSite()">성장 관리 서비스 바로가기</button>
    </div>
    
    <div id="posts-section">
    <div class="section-title">최신 성장 관리 정보</div>

    <div id="post-list-view">
        <div class="post-list" id="dynamic-post-list">
            </div>
    </div>

    <div id="pagination-container" style="display: flex; justify-content: center; gap: 10px; margin-top: 20px;">
        </div>
    </div>
</div>

<div id="post-detail-view">
    <div class="detail-content-wrapper">
        <div class="back-button-container">
            <button onclick="closePost()" class="back-button">
                ← 뒤로가기
            </button>
        </div>
        
        <div class="detail-content-box">
            <h2 id="detail-title">제목이 들어갑니다</h2>
            <div id="detail-body">내용이 들어갑니다</div>
        </div>
    </div>
</div>

<script>
    // 🌟🌟🌟 1. 하드코딩된 가상 성장 데이터 (P50 평균) 🌟🌟🌟
    const SAMPLE_GROWTH_DATA_MALE = [
        [0, 50.0], [1, 75.0], [2, 85.0], [3, 95.0], [4, 103.0], 
        [5, 110.0], [6, 117.0], [7, 123.0], [8, 129.0], [9, 134.0],
        [10, 140.0], [11, 146.0], [12, 153.0], [13, 160.0], [14, 166.0], [15, 170.0], [16, 172.0], [17, 173.0], [18, 174.0]
    ];
    const SAMPLE_GROWTH_DATA_FEMALE = [
        [0, 49.0], [1, 74.0], [2, 84.0], [3, 94.0], [4, 102.0], 
        [5, 109.0], [6, 116.0], [7, 122.0], [8, 128.0], [9, 133.0],
        [10, 139.0], [11, 145.0], [12, 151.0], [13, 156.0], [14, 160.0], [15, 161.0], [16, 162.0], [17, 162.5], [18, 163.0]
    ];

    let growthChartInstance = null; 

    document.addEventListener('DOMContentLoaded', function() {
        // 초기값 설정
        const currentYear = new Date().getFullYear();
        document.getElementById('birth_year').value = currentYear - 6; 
        
        // 폼 제출 이벤트 리스너 설정
        document.getElementById('height-calculator-form').addEventListener('submit', function(event) {
            event.preventDefault(); 
            calculateHeight();
        });
    });

    /**
     * 출생연도를 기반으로 만 나이(년)를 계산하는 함수
     */
    function calculateAge(birthYear) {
        const currentYear = new Date().getFullYear();
        const age = currentYear - birthYear; 
        return age; 
    }

    /**
     * 아이의 현재 키를 바탕으로 판정 (P50 기준 단순 비교)
     */
    function getPercentile(age, currentHeight, gender) {
        // 가상 데이터 사용
        const data = gender === 'male' ? SAMPLE_GROWTH_DATA_MALE : SAMPLE_GROWTH_DATA_FEMALE;
        
        const ageData = data.find(d => d[0] === age); 
        
        if (!ageData) {
            return { percentile: '정보 없음', judgment: '해당 나이 데이터 없음' };
        }
        
        const averageHeight = ageData[1]; // P50 값
        
        let percentile = '';
        let judgment = '';

        // 단순 비교 로직 (P50 기준 ±5cm)
        if (currentHeight >= averageHeight + 5) {
            percentile = '평균 이상';
            judgment = '큰 편';
        } else if (currentHeight <= averageHeight - 5) {
            percentile = '평균 이하';
            judgment = '작은 편';
        } else {
            percentile = '평균 근처';
            judgment = '보통';
        }
        
        return { percentile, judgment };
    }


    /**
     * Chart.js 데이터셋 준비 함수 (P50 단일 라인)
     */
    function getChartData(childAge, currentHeight, gender) {
        const data = gender === 'male' ? SAMPLE_GROWTH_DATA_MALE : SAMPLE_GROWTH_DATA_FEMALE;
        
        const labels = data.map(d => `${d[0]}세`);
        const p50Data = data.map(d => d[1]); // P50 (평균)

        const currentData = new Array(labels.length).fill(null);
        // 나이 범위 내에 있으면 포인트 표시
        if (childAge >= 0 && childAge < labels.length) {
            // 인덱스를 찾아서 넣거나, 나이(정수)를 그대로 인덱스로 사용
            const index = data.findIndex(d => d[0] === childAge);
            if(index !== -1) {
                currentData[index] = currentHeight; 
            }
        }

        return {
            labels: labels,
            datasets: [
                { 
                    label: '평균 키 (P50)', 
                    data: p50Data, 
                    borderColor: 'rgb(75, 192, 192)', 
                    backgroundColor: 'rgba(75, 192, 192, 0.1)', 
                    borderWidth: 3, 
                    pointRadius: 3, 
                    tension: 0.4, 
                    fill: false 
                },
                { 
                    label: '현재 아이 키', 
                    data: currentData, 
                    borderColor: 'rgb(255, 99, 132)', 
                    backgroundColor: 'rgb(255, 99, 132)', 
                    pointRadius: 8, 
                    pointStyle: 'circle', 
                    showLine: false, 
                    fill: false 
                }
            ]
        };
    }

    /**
     * Chart.js 그래프 그리기
     */
    function drawChart(data) {
        const ctx = document.getElementById('growthChart').getContext('2d');

        if (growthChartInstance) {
            growthChartInstance.destroy();
        }
        
        const allHeights = data.datasets.flatMap(d => d.data.filter(h => h !== null));
        const minHeight = Math.min(...allHeights);
        const maxHeight = Math.max(...allHeights);
        
        growthChartInstance = new Chart(ctx, {
            type: 'line',
            data: data,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: { display: true, text: '연령별 평균 성장 곡선', font: { size: 16, weight: 'bold' } },
                    legend: { position: 'bottom' }
                },
                scales: {
                    x: { title: { display: true, text: '만 나이 (세)' }, grid: { display: false } },
                    y: { title: { display: true, text: '키 (cm)' }, min: Math.floor((minHeight - 5) / 10) * 10, max: Math.ceil((maxHeight + 5) / 10) * 10 }
                }
            }
        });
    }


    /**
     * 메인 계산 함수
     */
    function calculateHeight() {
        const motherHeight = parseFloat(document.getElementById('mother_height').value);
        const fatherHeight = parseFloat(document.getElementById('father_height').value);
        const birthYear = parseInt(document.getElementById('birth_year').value);
        const currentHeight = parseFloat(document.getElementById('current_height').value);
        const genderElement = document.querySelector('input[name="gender"]:checked');
        const gender = genderElement ? genderElement.value : null;
        
        const errorMessage = document.getElementById('error-message');
        const resultBox = document.getElementById('result-box');
        const finalHeightSpan = document.getElementById('final-height');
        const postsSection = document.getElementById('posts-section'); 
        const childAgeElement = document.getElementById('child-age');
        const childPercentileElement = document.getElementById('child-percentile');
        const childJudgmentElement = document.getElementById('child-judgment');


        if (!genderElement || isNaN(motherHeight) || isNaN(fatherHeight) || motherHeight <= 0 || fatherHeight <= 0 || isNaN(birthYear) || isNaN(currentHeight)) {
            errorMessage.style.display = 'block';
            resultBox.style.display = 'none';
            postsSection.style.display = 'none'; 
            return;
        }

        errorMessage.style.display = 'none';

        // 예상 최종키 계산 (MPH)
        let predictedHeight = 0;
        const sumOfParents = motherHeight + fatherHeight;
        
        if (gender === 'male') {
            predictedHeight = (sumOfParents + 13) / 2;
        } else if (gender === 'female') {
            predictedHeight = (sumOfParents - 13) / 2;
        }
        
        // 백분위(평균 비교) 판정
        const childAgeYears = calculateAge(birthYear);
        const percentileResult = getPercentile(childAgeYears, currentHeight, gender);

        // 결과 표시
        finalHeightSpan.textContent = predictedHeight.toFixed(1);
        
        childAgeElement.textContent = `${childAgeYears}세`;
        childPercentileElement.textContent = percentileResult.percentile;
        childJudgmentElement.textContent = percentileResult.judgment;
        
        resultBox.style.display = 'block';
        postsSection.style.display = 'block'; 
        
        // 그래프 그리기
        const chartData = getChartData(childAgeYears, currentHeight, gender);
        drawChart(chartData);
        
        // 자동 스크롤 (지연 시간 적용)
        setTimeout(() => {
            resultBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    }

    /**
     * 외부 서비스 사이트 이동
     */
    function goToExternalSite() {
        const targetUrl = "https://www.example-growth-service.com"; 
        window.open(targetUrl, '_blank');
    }

    // // 🌟 게시물 데이터 저장소
    // const POST_CONTENTS = {
    //     'post1': {
    //         title: "밤에 숙면이 키 성장에 미치는 영향",
    //         body: `
    //             <p><strong>1. 성장 호르몬의 비밀</strong><br>
    //             아이들의 키 성장에 필수적인 성장 호르몬은 하루 종일 분비되는 것이 아니라, 특정 시간에 집중적으로 분비됩니다. 특히 밤 10시에서 새벽 2시 사이, 깊은 잠에 빠졌을 때 가장 많이 나옵니다.</p>
    //             <p><strong>2. 수면 환경 조성하기</strong><br>
    //             잠자기 1시간 전에는 스마트폰을 멀리하고, 침실 온도는 약간 서늘하게(22도 정도) 유지하는 것이 좋습니다. 암막 커튼을 활용해 빛을 완전히 차단하면 멜라토닌 분비가 촉진됩니다.</p>
    //             <p><strong>3. 규칙적인 습관</strong><br>
    //             주말이라고 늦게 자고 늦게 일어나는 것보다는, 매일 일정한 시간에 잠자리에 드는 것이 생체 리듬을 유지하여 성장에 훨씬 유리합니다.</p>
    //         `
    //     },
    //     'post2': {
    //         title: "성장판 자극! 키 크는 음식 베스트 5",

    // ==========================================
    // 🌟 게시판 관리 시스템 (JSON 연동 + 페이지네이션) 🌟
    // ==========================================
    
    let ALL_POSTS = [];      // 전체 게시물 담을 통
    const ITEMS_PER_PAGE = 3; // 한 페이지에 보여줄 개수 (여기서 수정 가능)
    let CURRENT_PAGE = 1;

    // 페이지 로드 시 게시물 불러오기 시작
    document.addEventListener('DOMContentLoaded', async function() {
        // ... (기존 성장 계산기 초기화 코드들) ...

        await loadPosts(); // 게시물 로딩 시작
    });

    /**
     * 1. posts.json 파일 읽어오기
     */
    async function loadPosts() {
        try {
            const response = await fetch('posts.json');
            ALL_POSTS = await response.json();
            
            // 첫 페이지 그리기
            renderPostList(1);
            renderPagination();
        } catch (error) {
            console.error("게시물 로드 실패:", error);
            document.getElementById('dynamic-post-list').innerHTML = "<p style='text-align:center;'>게시물을 불러오는 중 오류가 발생했습니다.</p>";
        }
    }

    /**
     * 2. 화면에 게시물 목록 뿌리기
     */
    function renderPostList(page) {
        const listContainer = document.getElementById('dynamic-post-list');
        listContainer.innerHTML = ""; // 싹 비우기

        // 보여줄 범위 계산 (예: 1페이지면 0~3번, 2페이지면 3~6번)
        const startIndex = (page - 1) * ITEMS_PER_PAGE;
        const endIndex = startIndex + ITEMS_PER_PAGE;
        const pageData = ALL_POSTS.slice(startIndex, endIndex);

        // 하나씩 HTML 만들어서 넣기
        pageData.forEach(post => {
            const html = `
                <div class="post-item" onclick="openPost('${post.id}')">
                    <img src="${post.image}" alt="썸네일" class="post-thumbnail">
                    <div class="post-info">
                        <div class="post-title">${post.title}</div>
                        <div class="post-summary">${post.summary}</div>
                    </div>
                </div>
            `;
            listContainer.innerHTML += html;
        });

        CURRENT_PAGE = page;
        renderPagination(); // 페이지 번호 갱신
    }

    /**
     * 3. 페이지 번호 버튼 만들기
     */
    function renderPagination() {
        const container = document.getElementById('pagination-container');
        container.innerHTML = "";

        const totalPages = Math.ceil(ALL_POSTS.length / ITEMS_PER_PAGE);
        if (totalPages <= 1) return; // 1페이지뿐이면 버튼 안 만듦

        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            
            // 스타일 꾸미기
            btn.style.border = "none";
            btn.style.padding = "5px 12px";
            btn.style.cursor = "pointer";
            btn.style.borderRadius = "5px";
            btn.style.background = (i === CURRENT_PAGE) ? "#2563eb" : "#eee"; // 현재 페이지는 파란색
            btn.style.color = (i === CURRENT_PAGE) ? "white" : "#333";
            btn.style.fontWeight = "bold";

            btn.onclick = () => renderPostList(i); // 클릭하면 이동
            container.appendChild(btn);
        }
    }

    /**
     * 4. 게시물 클릭 시 상세 내용 보여주기 (오버레이)
     */
    function openPost(postId) {
        // 전체 데이터에서 ID로 찾기
        const post = ALL_POSTS.find(p => p.id === postId);
        if (!post) return;

        // 내용 채우기
        document.getElementById('detail-title').innerHTML = post.title;
        document.getElementById('detail-body').innerHTML = post.body;

        // 화면 덮기
        document.getElementById('post-detail-view').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    // 닫기 함수는 기존과 동일
    function closePost() {
        document.getElementById('post-detail-view').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>
